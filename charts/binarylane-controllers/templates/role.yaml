apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "binarylane-controllers.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "binarylane-controllers.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # AutoScalingGroup templateVariables may reference ConfigMap keys for
  # non-sensitive values (e.g. API server URL), read at scale-up time.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
{{- range .Values.secretNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "binarylane-controllers.fullname" $ }}-secrets
  namespace: {{ . }}
  labels:
    {{- include "binarylane-controllers.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
{{- end }}
