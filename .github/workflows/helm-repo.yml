name: Helm repo

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: helm-repo

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: azure/setup-helm@v4

      - name: Prepare gh-pages worktree
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code origin refs/heads/gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
          fi

      - name: Download chart from release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          gh release download "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern '*.tgz' \
            --dir .

      - name: Update repo index
        run: |
          helm repo index . --url "https://samcday.github.io/binarylane-controllers"

      - name: Commit and push
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          git add .
          git commit -m "Helm repo: ${TAG_NAME}" || { echo "No changes"; exit 0; }
          git push origin gh-pages
