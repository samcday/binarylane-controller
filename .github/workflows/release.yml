name: Release

on:
  push:
    tags:
      - "v*"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  packages: write
  pull-requests: read

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.detect.outputs.enabled }}
      mode: ${{ steps.detect.outputs.mode }}
      prerelease: ${{ steps.detect.outputs.prerelease }}
      version: ${{ steps.detect.outputs.version }}
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail

          enabled=false
          mode=none
          prerelease=false
          version=""

          if [[ "$EVENT_NAME" == "push" ]] \
            && [[ "$REF_TYPE" == "tag" ]] \
            && [[ "$REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?)$ ]]; then
            enabled=true
            mode=tag
            version="${BASH_REMATCH[1]}"
          elif [[ "$EVENT_NAME" == "pull_request" ]] \
            && [[ "$PR_HEAD_REPO" == "$REPOSITORY" ]] \
            && [[ "$PR_HEAD_REF" =~ ^release/v([0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?)$ ]]; then
            enabled=true
            mode=pr
            version="${BASH_REMATCH[1]}"
          fi

          if [[ -n "$version" && "$version" =~ -rc\.[0-9]+$ ]]; then
            prerelease=true
          fi

          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

  release:
    needs: gate
    if: needs.gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - if: needs.gate.outputs.mode == 'tag'
        name: Require release automation token
        env:
          RELEASE_GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$RELEASE_GITHUB_TOKEN" ]]; then
            echo "RELEASE_GITHUB_TOKEN secret is required for release automation."
            exit 1
          fi

      - if: needs.gate.outputs.mode == 'tag'
        name: Fetch release notes from version issue
        id: notes
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          VERSION: ${{ needs.gate.outputs.version }}
        run: |
          set -euo pipefail

          # Strip -rc.N suffix to find the base version issue
          base_version="${VERSION%%-rc.*}"

          body="$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --search "v${base_version} in:title" \
            --state all \
            --json title,body \
            --jq '.[] | select(.title == "v'"${base_version}"'") | .body' \
            | head -1)" || true

          if [[ -n "$body" ]]; then
            # Write to file to avoid quoting issues
            printf '%s\n' "$body" > "$RUNNER_TEMP/release-notes.md"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - if: needs.gate.outputs.mode == 'tag' && steps.notes.outputs.found == 'true'
        name: Create draft release (with issue notes)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.gate.outputs.tag }}
          body_path: ${{ runner.temp }}/release-notes.md
          prerelease: ${{ needs.gate.outputs.prerelease }}
          draft: true
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}

      - if: needs.gate.outputs.mode == 'tag' && steps.notes.outputs.found != 'true'
        name: Create draft release (auto-generated notes)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.gate.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ needs.gate.outputs.prerelease }}
          draft: true
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}

      - if: needs.gate.outputs.mode == 'pr'
        run: |
          echo "release/v* PR mode: skipping draft creation"

  ci:
    needs: [gate, release]
    if: needs.gate.outputs.enabled == 'true'
    uses: ./.github/workflows/ci.yml
    with:
      force: true
    secrets: inherit

  docker:
    needs: [gate, release, ci]
    if: needs.gate.outputs.enabled == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/binarylane-controller
          tags: |
            type=semver,pattern={{version}},value=${{ needs.gate.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.gate.outputs.tag }}
            type=raw,value=latest,enable=${{ needs.gate.outputs.prerelease == 'false' && needs.gate.outputs.mode == 'tag' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.gate.outputs.mode == 'tag' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    needs: [gate, release, ci]
    if: needs.gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint chart/

      - name: Package chart
        run: helm package chart/

      - if: needs.gate.outputs.mode == 'tag'
        name: Push chart to GHCR
        run: |
          set -euo pipefail
          helm registry login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          helm push binarylane-controller-${{ needs.gate.outputs.version }}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

      - if: needs.gate.outputs.mode == 'tag'
        name: Upload chart to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.gate.outputs.tag }}
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          files: binarylane-controller-${{ needs.gate.outputs.version }}.tgz

  publish-release:
    needs: [gate, release, docker, helm]
    if: needs.gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - if: needs.gate.outputs.mode == 'tag'
        name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.gate.outputs.tag }}
        run: |
          set -euo pipefail

          gh release edit "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --draft=false >/dev/null

          draft_state="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" --jq '.draft')"
          if [[ "$draft_state" != "false" ]]; then
            echo "::error::release ${TAG_NAME} is still marked as draft"
            exit 1
          fi

      - if: needs.gate.outputs.mode == 'pr'
        run: |
          echo "release/v* PR mode: skipping draft publication"

  pass:
    name: Pass
    needs: [gate, release, ci, docker, helm, publish-release]
    runs-on: ubuntu-latest
    if: always() && needs.gate.outputs.enabled == 'true'
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
